<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Sign Up - SkillMate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen px-4">

  <div class="bg-white shadow-md rounded-xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6">Welcome to SkillMate</h2>

    <!-- Tabs -->
    <div class="flex mb-6">
      <button id="loginTab" class="flex-1 py-2 font-bold border-b-2 border-indigo-600 text-indigo-600">
        Login
      </button>
      <button id="signupTab" class="flex-1 py-2 font-bold border-b-2 border-transparent text-gray-600">
        Sign Up
      </button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-4">
      <input id="loginEmail" type="email" class="w-full p-3 border rounded-lg" placeholder="Email" required />
      <input id="loginPassword" type="password" class="w-full p-3 border rounded-lg" placeholder="Password" required />

      <button
        type="submit"
        class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition"
      >
        Login
      </button>
    </form>

    <!-- Signup Form -->
    <form id="signupForm" class="space-y-4 hidden">
      <input id="signupFirstName" type="text" class="w-full p-3 border rounded-lg" placeholder="First Name" required />
      <input id="signupEmail" type="email" class="w-full p-3 border rounded-lg" placeholder="Email" required />
      <input id="signupPassword" type="password" class="w-full p-3 border rounded-lg" placeholder="Password" required />

      <button
        type="submit"
        class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition"
      >
        Create Account
      </button>
    </form>

  </div>

  <script type="module">
  import { signupUser, loginUser } from "./auth.js";

  // Tabs
  const loginTab = document.getElementById("loginTab");
  const signupTab = document.getElementById("signupTab");
  const loginForm = document.getElementById("loginForm");
  const signupForm = document.getElementById("signupForm");

  loginTab.onclick = () => {
    loginForm.classList.remove("hidden");
    signupForm.classList.add("hidden");
    loginTab.classList.add("border-indigo-600", "text-indigo-600");
    signupTab.classList.remove("border-indigo-600", "text-indigo-600");
  };

  signupTab.onclick = () => {
    signupForm.classList.remove("hidden");
    loginForm.classList.add("hidden");
    signupTab.classList.add("border-indigo-600", "text-indigo-600");
    loginTab.classList.remove("border-indigo-600", "text-indigo-600");
  };

  // LOGIN
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = loginEmail.value;
    const password = loginPassword.value;

    try {
      await loginUser(email, password); // 👈 use auth.js function
    } catch (err) {
      alert("❌ Login failed: " + err.message);
    }
  });

  // SIGN UP
  signupForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const firstName = signupFirstName.value.trim();
    const email = signupEmail.value.trim();
    const password = signupPassword.value.trim();

    try {
      await signupUser(firstName, email, password); // 👈 use auth.js function
    } catch (err) {
      alert("❌ Signup failed: " + err.message);
    }
  });
</script>

</body>
</html>
