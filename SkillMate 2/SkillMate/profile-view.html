<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - SkillMate</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js"></script>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">
  <main class="flex-grow py-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">
      <div class="bg-white rounded-2xl shadow-sm p-8 border border-gray-100">
        <div id="profileContainer">
          <div class="text-center py-12" id="loadingProfile">
            <i data-feather="user" class="w-16 h-16 mx-auto mb-4 text-gray-300"></i>
            <p class="text-gray-500">Loading profile...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { 
      initializeApp 
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";

    import { 
      getFirestore, doc, getDoc, setDoc, collection, addDoc, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    import { 
      getAuth, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    // 🚀 Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyD5qXlIPMr2a0iKShp9ZmImlp0qSGejta4",
      authDomain: "skillmate-c714f.firebaseapp.com",
      projectId: "skillmate-c714f",
      storageBucket: "skillmate-c714f.firebasestorage.app",
      messagingSenderId: "930805958867",
      appId: "1:930805958867:web:808716df41ec201f272c26",
      measurementId: "G-K5TFL99HZM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const container = document.getElementById("profileContainer");

    // Get UID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const profileUid = urlParams.get("user");

    if (!profileUid) {
      container.innerHTML = `
        <div class="text-center py-12 text-gray-500">
          <i data-feather="alert-circle" class="w-16 h-16 mx-auto mb-4 text-gray-300"></i>
          <h3 class="text-lg font-semibold text-gray-600 mb-2">No user selected</h3>
        </div>`;
      feather.replace();
    }

    // Load profile
    onAuthStateChanged(auth, async (currentUser) => {

      const profileRef = doc(db, "users", profileUid);
      const profileSnap = await getDoc(profileRef);

      if (!profileSnap.exists()) {
        container.innerHTML = `
          <div class="text-center py-12 text-gray-500">
            <i data-feather="user-x" class="w-16 h-16 mx-auto mb-4 text-gray-300"></i>
            <h3 class="text-lg font-semibold text-gray-600 mb-2">Profile Not Found</h3>
          </div>`;
        feather.replace();
        return;
      }

      const data = profileSnap.data();

      container.innerHTML = `
        <div class="flex flex-col md:flex-row items-start md:items-center gap-8 mb-8 pb-8 border-b border-gray-200">
          <div class="flex-shrink-0">
            <img src="${data.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                 class="w-32 h-32 rounded-full border-4 border-white shadow-lg">
          </div>

          <div class="flex-1 min-w-0">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">
              ${data.name || data.firstName || "User"}
            </h1>

            <div class="flex gap-4 mt-4">
              <button id="connectBtn"
                class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700 transition">
                Connect
              </button>

              <button id="chatBtn"
                class="bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 transition">
                Chat
              </button>
            </div>
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <h2 class="text-xl font-semibold text-green-700 mb-2">Skills Offered</h2>
            ${data.skillsOffered?.length
              ? data.skillsOffered.map(s =>
                  `<span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm mr-2">${s}</span>`).join("")
              : "<p class='text-gray-500'>No skills listed</p>"}
          </div>

          <div>
            <h2 class="text-xl font-semibold text-blue-700 mb-2">Skills Needed</h2>
            ${data.skillsNeeded?.length
              ? data.skillsNeeded.map(s =>
                  `<span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm mr-2">${s}</span>`).join("")
              : "<p class='text-gray-500'>No skills listed</p>"}
          </div>
        </div>
      `;

      feather.replace();

      // ⭐ CHAT BUTTON
      document.getElementById("chatBtn").addEventListener("click", () => {
        window.location.href = `chat.html?user=${profileUid}`;
      });

      // ⭐ CONNECT BUTTON → save request in /requests
      document.getElementById("connectBtn").addEventListener("click", async () => {
        if (!currentUser) {
          alert("Please login first.");
          return;
        }

        if (currentUser.uid === profileUid) {
          alert("You cannot connect with yourself.");
          return;
        }

        // Add new request to /requests collection
        await addDoc(collection(db, "requests"), {
          from: currentUser.uid,
          to: profileUid,
          status: "pending",
          timestamp: serverTimestamp()
        });

        alert("Connection request sent!");
      });
    });
  </script>
</body>
</html>
